name: Daily concert candidate collection

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  collect:
    name: Collect candidates for review
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect Damai candidates
        run: node scripts/collect-damai-candidates.js

      - name: Create review pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- data/pending-events.json data/collection-report.md; then
            echo "No new pending candidates."
            exit 0
          fi

          branch="automation/daily-concert-candidates"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add data/pending-events.json data/collection-report.md
          git commit -m "Collect concert candidates for review"
          git push --force-with-lease origin "$branch"

          if gh pr view "$branch" --json number >/dev/null 2>&1; then
            echo "Review PR already exists."
          else
            gh pr create \
              --title "Review newly collected concert candidates" \
              --body-file data/collection-report.md \
              --base main \
              --head "$branch"
          fi
